name: tourismapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # أيقونات وواجهة
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.4
  flutter_screenutil: ^5.9.3
  go_router: ^14.8.1
  flutter_svg: ^2.2.2

  # 🌙 الثيمات والمظهر
  sentry_flutter: ^8.14.2

  # 🪶 أدوات الشبكة والتحليل
  http: 1.5.0
  dio: ^5.7.0
  dartz: ^0.10.1
  get_it: ^8.0.3
  shared_preferences: ^2.5.4
  equatable: ^2.0.5
  pretty_dio_logger: ^1.4.0
  flutter_easyloading: ^3.0.5

  # 🖼️ الصور والتحميل
  cached_network_image: 3.4.1
  flutter_spinkit: ^5.2.2

  # 🧠 أخرى
  intl: ^0.20.2
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  table_calendar: ^3.2.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/logonew.png
  min_sdk_android: 21
  web:
    generate: true
    image_path: assets/logonew.png
    background_color: "#ffffff"
    theme_color: "#134FA2"
  windows:
    generate: true
    image_path: assets/logonew.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/logonew.png
